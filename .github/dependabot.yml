#  Dependabot 配置 - 自动检测和更新依赖
#  文件路径: .github/dependabot.yml

version: 2

updates:
  #  npm 依赖更新
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
    #  分组更新，减少 PR 数量
    groups:
      typescript:
        patterns:
          - "typescript"
          - "ts-node"
          - "@types/*"
      testing:
        patterns:
          - "nodemon"

  #  GitHub Actions 版本更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"

  #  Docker 基础镜像更新
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
