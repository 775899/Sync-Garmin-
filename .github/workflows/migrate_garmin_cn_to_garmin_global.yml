name: Migrate Garmin CN to Garmin Global

on:
  workflow_dispatch:

concurrency:
  group: migrate-cn-to-global
  cancel-in-progress: false

env:
  BARK_KEY: ${{ secrets.BARK_KEY }}
  GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
  GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}
  GARMIN_MIGRATE_NUM: ${{ secrets.GARMIN_MIGRATE_NUM }}
  GARMIN_MIGRATE_START: ${{ secrets.GARMIN_MIGRATE_START }}

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Migrate Garmin CN to Garmin Global
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Run migration
        run: yarn migrate_garmin_cn_to_global

      - name: Save Garmin Session
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: save garmin session [skip ci]"

      - name: Notify failure via Bark
        if: failure() && env.BARK_KEY != ''
        run: |
          curl -s "https://api.day.app/${BARK_KEY}/Garmin迁移失败-CN到Global/迁移任务执行失败?group=Garmin&sound=alert&icon=https://github.com/actions.png"
