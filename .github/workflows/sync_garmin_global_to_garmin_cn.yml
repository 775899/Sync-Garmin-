name: Sync Garmin Global to Garmin CN

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: sync-global-to-cn
  cancel-in-progress: true

env:
  RQ_COOKIE: ${{ secrets.RQ_COOKIE }}
  RQ_CSRF_TOKEN: ${{ secrets.RQ_CSRF_TOKEN }}
  RQ_USERID: ${{ secrets.RQ_USERID }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_API_CLIENT_EMAIL: ${{ secrets.GOOGLE_API_CLIENT_EMAIL }}
  GOOGLE_API_PRIVATE_KEY: ${{ secrets.GOOGLE_API_PRIVATE_KEY }}
  BARK_KEY: ${{ secrets.BARK_KEY }}
  GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
  GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync Garmin Global to Garmin CN
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Random delay (0-120s)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 120))
          echo "Waiting ${DELAY}s to avoid rate limit..."
          sleep $DELAY

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Run sync
        run: yarn sync_global
        timeout-minutes: 5

      - name: Save Garmin Session
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: save garmin session [skip ci]"

      - name: Notify failure via Bark
        if: failure() && env.BARK_KEY != ''
        run: |
          curl -s "https://api.day.app/${BARK_KEY}/Garmin同步失败-Global到CN/定时同步执行失败?group=Garmin&sound=alert&icon=https://github.com/actions.png"
